name: Hiring42 Multi-Keyword Scraper

on:

  schedule:

    # Start exactly at 6:30 PM IST
    - cron: "30 13 * * 1-5"

    # Continue every 15 minutes until midnight IST
    - cron: "*/15 14-18 * * 1-5"

    # After midnight until 4:30 AM IST
    - cron: "*/15 19-22 * * 1-5"

    # Last run at 4:30 AM IST
    - cron: "0,15,30 23 * * 1-5"

  workflow_dispatch:

jobs:

  scrape-jobs:

    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps

      - name: Run scraper
        run: |
          python hiring42_scraper.py

      - name: List generated CSV files
        run: |
          echo "Files created:"
          ls -lh *.csv || echo "No CSV files found"

      - name: Upload CSV files
        uses: actions/upload-artifact@v4
        with:
          name: hiring42-results
          path: "*.csv"
          if-no-files-found: warn