name: AI Email Agent - Manasa (Frontend Developer)

on:
  schedule:
    # Runs every 10 min between 6:30 PM - 4:30 AM IST (13:00 - 23:00 UTC)
    - cron: '*/10 13-22 * * *'    # 6:30 PM to 4:29 AM IST
    - cron: '0,10,20,30 23 * * *' # 4:30 AM IST cutoff (last 4 runs)
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run Email Agent - Manasa
        env:
          YOUR_NAME:            ${{ secrets.YOUR_NAME }}
          YOUR_EMAIL:           ${{ secrets.YOUR_EMAIL }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          RESUME_FRONTEND_B64:  ${{ secrets.RESUME_FRONTEND_B64 }}
          CC_FRONTEND:          ${{ secrets.CC_FRONTEND }}
        run: python agent3.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-manasa-${{ github.run_number }}
          path: logs/
          retention-days: 30
