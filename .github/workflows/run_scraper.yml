name: Hiring42 Scraper

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-scraper:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install

      - name: Run scraper
        run: |
          python hiring42_scraper.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: hiring42-results
          path: |
            *.csv