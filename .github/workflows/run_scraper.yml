name: Hiring42 Multi-Keyword Scraper

on:
  schedule:
    - cron: "*/15 * * * *"   # runs every 15 minutes
  workflow_dispatch:          # allows manual run

jobs:

  scrape-jobs:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps

      - name: Run scraper
        run: |
          python hiring42_scraper.py

      # This step helps debug and confirm files exist
      - name: List generated CSV files
        run: |
          echo "Files created:"
          ls -lh *.csv || echo "No CSV files found"

      # Upload ALL keyword files
      - name: Upload CSV files
        uses: actions/upload-artifact@v4
        with:
          name: hiring42-results
          path: "*.csv"
          if-no-files-found: warn
