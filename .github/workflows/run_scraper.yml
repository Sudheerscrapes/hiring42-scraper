name: Hiring42 Multi-Keyword Scraper

on:

  schedule:

    # Weekdays evening (6:30 PM IST → 11:59 PM IST)
    - cron: "*/15 13-18 * * 1-5"

    # Weekdays night (12:00 AM IST → 4:30 AM IST)
    - cron: "*/15 19-23 * * 1-5"

  workflow_dispatch:

jobs:

  scrape-jobs:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps

      - name: Run scraper
        run: |
          python hiring42_scraper.py

      - name: List generated CSV files
        run: |
          echo "Files created:"
          ls -lh *.csv || echo "No CSV files found"

      - name: Upload CSV files
        uses: actions/upload-artifact@v4
        with:
          name: hiring42-results
          path: "*.csv"
          if-no-files-found: warn
