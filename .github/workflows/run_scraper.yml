name: Run Hiring42 Scraper

on:
schedule:
- cron: "*/15 * * * *"
workflow_dispatch:

jobs:
run-scraper:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install dependencies
    run: |
      pip install -r requirements.txt

  - name: Run scraper
    run: |
      python hiring42_scraper1.py
```
