name: AI Email Agent - Swarna (Data Engineer)

on:
  schedule:
    # Runs every 10 min between 6:30 PM - 4:30 AM IST (13:00 - 23:00 UTC)
    - cron: '*/10 13-22 * * *'   # 6:30 PM to 4:29 AM IST
    - cron: '0,10,20,30 23 * * *' # 4:30 AM IST cutoff (last 4 runs)
  workflow_dispatch:               # manual trigger anytime

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Email Agent - Swarna
        env:
          YOUR_EMAIL:               ${{ secrets.YOUR_EMAIL }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
          CC_DATA:                  ${{ secrets.CC_DATA_ENGINEER }}
          RESUME_DATA_ENGINEER_B64: ${{ secrets.RESUME_DATA_ENGINEER_B64 }}
        run: python agent1.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-swarna-${{ github.run_number }}
          path: logs/
          retention-days: 30
