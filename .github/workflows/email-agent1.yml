name: AI Email Agent - Swarna (Data Engineer)

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:           # manual trigger anytime

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Email Agent - Swarna
        env:
          YOUR_NAME:                ${{ secrets.YOUR_NAME }}
          YOUR_EMAIL:               ${{ secrets.YOUR_EMAIL }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
          RESUME_DATA_ENGINEER_B64: ${{ secrets.RESUME_DATA_ENGINEER_B64 }}
          CC_DATA_ENGINEER:         ${{ secrets.CC_DATA_ENGINEER }}
        run: python agent1.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-swarna-${{ github.run_number }}
          path: logs/
          retention-days: 30
